<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canopy</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: default; }
  canvas { display: block; position: fixed; inset: 0; }
  #scene { display: none; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<canvas id="output"></canvas>
<script>
const sceneCanvas = document.getElementById('scene');
const outCanvas = document.getElementById('output');
const sctx = sceneCanvas.getContext('2d');
const ctx = outCanvas.getContext('2d');

let W, H, t = 0;
const CELL = 6;
let cols, rows;

const codeChars = '01{}[]<>():;=+-*/|!~#@_アイウカキ∞◇◆□∆∇⊕⊗'.split('');
let charGrid = [];
let charTimer = 0;

function resize() {
  W = sceneCanvas.width = outCanvas.width = window.innerWidth;
  H = sceneCanvas.height = outCanvas.height = window.innerHeight;
  cols = Math.ceil(W / CELL);
  rows = Math.ceil(H / CELL);
  charGrid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) row.push(codeChars[Math.floor(Math.random() * codeChars.length)]);
    charGrid.push(row);
  }
  initTrees();
}

// ── Tree generation — many trunks radiating from edges toward center ──
let trees = [];
function initTrees() {
  trees = [];
  const cx = W * 0.5, cy = H * 0.48;
  // 14-18 major trunks like the reference image
  const trunkCount = 15 + Math.floor(Math.random() * 4);
  for (let i = 0; i < trunkCount; i++) {
    const angle = (i / trunkCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    // Start at edges of the canvas
    const edgeDist = Math.max(W, H) * 0.55 + Math.random() * 50;
    const startX = cx + Math.cos(angle) * edgeDist;
    const startY = cy + Math.sin(angle) * edgeDist;
    // End near center but not at center
    const endDist = 30 + Math.random() * 80;
    const endX = cx + Math.cos(angle + Math.PI) * endDist + (Math.random() - 0.5) * 40;
    const endY = cy + Math.sin(angle + Math.PI) * endDist + (Math.random() - 0.5) * 30;

    const trunk = {
      startX, startY, endX, endY,
      width: 8 + Math.random() * 18, // thicker trunks
      seed: Math.random() * 100,
      branches: [],
    };

    // Generate branches along the trunk
    const branchCount = 4 + Math.floor(Math.random() * 6);
    for (let j = 0; j < branchCount; j++) {
      const prog = 0.15 + (j / branchCount) * 0.7 + (Math.random() - 0.5) * 0.1;
      const bx = startX + (endX - startX) * prog;
      const by = startY + (endY - startY) * prog;
      const branchAngle = angle + Math.PI + (Math.random() - 0.5) * 1.8;
      const branchLen = 30 + Math.random() * 80;
      trunk.branches.push({
        x: bx, y: by,
        angle: branchAngle,
        len: branchLen,
        width: trunk.width * (0.2 + Math.random() * 0.3),
        seed: Math.random() * 100,
        subBranches: Math.floor(1 + Math.random() * 3),
      });
    }

    trees.push(trunk);
  }
}

resize();
window.addEventListener('resize', resize);

function renderScene() {
  const cx = W * 0.5, cy = H * 0.48;

  // ── VIVID SKY — pink, purple, blue, teal, deep plum ──
  // Like the reference but in our palette — radial from center
  sctx.fillStyle = '#000';
  sctx.fillRect(0, 0, W, H);

  sctx.save();
  sctx.globalCompositeOperation = 'lighter';

  // Multiple overlapping color zones creating a rich sky
  // Deep violet center
  const c1 = sctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.45);
  c1.addColorStop(0, 'rgba(140, 80, 200, 0.50)');
  c1.addColorStop(0.3, 'rgba(100, 50, 160, 0.30)');
  c1.addColorStop(0.6, 'rgba(60, 25, 110, 0.12)');
  c1.addColorStop(1, 'transparent');
  sctx.fillStyle = c1;
  sctx.fillRect(0, 0, W, H);

  // Pink/magenta — upper left quadrant
  const c2 = sctx.createRadialGradient(cx - W * 0.15, cy - H * 0.15, 0, cx, cy, W * 0.4);
  c2.addColorStop(0, 'rgba(200, 50, 120, 0.40)');
  c2.addColorStop(0.3, 'rgba(160, 30, 90, 0.20)');
  c2.addColorStop(0.6, 'rgba(100, 15, 60, 0.06)');
  c2.addColorStop(1, 'transparent');
  sctx.fillStyle = c2;
  sctx.fillRect(0, 0, W, H);

  // Teal/cyan — lower right
  const c3 = sctx.createRadialGradient(cx + W * 0.12, cy + H * 0.12, 0, cx, cy, W * 0.38);
  c3.addColorStop(0, 'rgba(0, 180, 160, 0.30)');
  c3.addColorStop(0.3, 'rgba(0, 120, 120, 0.15)');
  c3.addColorStop(0.6, 'rgba(0, 60, 80, 0.04)');
  c3.addColorStop(1, 'transparent');
  sctx.fillStyle = c3;
  sctx.fillRect(0, 0, W, H);

  // Blue — right side
  const c4 = sctx.createRadialGradient(cx + W * 0.18, cy - H * 0.05, 0, cx, cy, W * 0.35);
  c4.addColorStop(0, 'rgba(40, 80, 200, 0.30)');
  c4.addColorStop(0.4, 'rgba(25, 50, 140, 0.12)');
  c4.addColorStop(1, 'transparent');
  sctx.fillStyle = c4;
  sctx.fillRect(0, 0, W, H);

  // Amber/gold — accent patch
  const c5 = sctx.createRadialGradient(cx - W * 0.08, cy + H * 0.08, 0, cx, cy, W * 0.2);
  c5.addColorStop(0, 'rgba(210, 160, 30, 0.18)');
  c5.addColorStop(0.4, 'rgba(160, 100, 20, 0.06)');
  c5.addColorStop(1, 'transparent');
  sctx.fillStyle = c5;
  sctx.fillRect(0, 0, W, H);

  // Deep plum — left edge
  const c6 = sctx.createRadialGradient(cx - W * 0.2, cy, 0, cx, cy, W * 0.35);
  c6.addColorStop(0, 'rgba(120, 20, 80, 0.28)');
  c6.addColorStop(0.4, 'rgba(80, 10, 55, 0.10)');
  c6.addColorStop(1, 'transparent');
  sctx.fillStyle = c6;
  sctx.fillRect(0, 0, W, H);

  // ── Surreal clouds — soft bright drifting patches ──
  for (let i = 0; i < 10; i++) {
    const cloudX = cx + Math.sin(t * 0.004 + i * 2.1) * W * 0.18 + Math.cos(i * 1.3) * W * 0.1;
    const cloudY = cy + Math.cos(t * 0.005 + i * 1.7) * H * 0.15 + Math.sin(i * 0.9) * H * 0.08;
    const cloudR = 25 + Math.sin(t * 0.008 + i * 0.7) * 12 + i * 3;
    // Each cloud picks up nearby sky color
    const hue = [290, 320, 180, 230, 40, 300, 200, 310, 170, 270][i];
    const sat = 50 + Math.sin(t * 0.01 + i) * 15;
    const light = 55 + Math.sin(t * 0.015 + i * 1.2) * 10;
    const cAlpha = 0.12 + Math.sin(t * 0.02 + i * 1.5) * 0.04;

    const cg = sctx.createRadialGradient(cloudX, cloudY, 0, cloudX, cloudY, cloudR);
    cg.addColorStop(0, `hsla(${hue}, ${sat}%, ${light}%, ${cAlpha})`);
    cg.addColorStop(0.4, `hsla(${hue}, ${sat - 10}%, ${light - 10}%, ${cAlpha * 0.4})`);
    cg.addColorStop(1, 'transparent');
    sctx.fillStyle = cg;
    sctx.fillRect(cloudX - cloudR, cloudY - cloudR, cloudR * 2, cloudR * 2);
  }

  // ── Dappled light flickers ──
  for (let i = 0; i < 30; i++) {
    const lx = cx + (Math.sin(t * 0.006 + i * 2.3) - 0.5) * W * 0.7;
    const ly = cy + (Math.cos(t * 0.008 + i * 1.9) - 0.5) * H * 0.7;
    const flicker = Math.sin(t * 0.5 + i * 3.1) * 0.3 + Math.sin(t * 0.18 + i * 1.6) * 0.2 + 0.5;
    if (flicker > 0.4) {
      const lr = 3 + Math.sin(t * 0.03 + i * 0.8) * 2;
      const hue = [280, 320, 190, 230, 40][i % 5];
      const lg = sctx.createRadialGradient(lx, ly, 0, lx, ly, lr);
      lg.addColorStop(0, `hsla(${hue}, 60%, 55%, ${flicker * 0.12})`);
      lg.addColorStop(1, 'transparent');
      sctx.fillStyle = lg;
      sctx.fillRect(lx - lr, ly - lr, lr * 2, lr * 2);
    }
  }

  sctx.restore();

  // ── TREES — dark silhouettes over the bright sky ──
  // Normal composite = blocks/covers the light
  sctx.lineCap = 'round';
  sctx.lineJoin = 'round';

  for (const trunk of trees) {
    const sway = Math.sin(t * 0.025 + trunk.seed) * 3;
    const sx = trunk.startX + sway * 0.2;
    const sy = trunk.startY + sway * 0.1;
    const ex = trunk.endX + sway;
    const ey = trunk.endY + sway * 0.5;

    // Main trunk
    sctx.strokeStyle = 'rgba(2, 1, 4, 0.92)';
    sctx.lineWidth = trunk.width;
    sctx.beginPath();
    sctx.moveTo(sx, sy);
    // Organic curve
    const m1x = sx + (ex - sx) * 0.3 + Math.sin(trunk.seed) * 15 + Math.sin(t * 0.02 + trunk.seed) * 3;
    const m1y = sy + (ey - sy) * 0.3 + Math.cos(trunk.seed) * 10;
    const m2x = sx + (ex - sx) * 0.7 + Math.cos(trunk.seed * 2) * 12 + Math.sin(t * 0.03 + trunk.seed) * 4;
    const m2y = sy + (ey - sy) * 0.7 + Math.sin(trunk.seed * 2) * 8;
    sctx.bezierCurveTo(m1x, m1y, m2x, m2y, ex, ey);
    sctx.stroke();

    // Taper — draw again thinner near the top
    sctx.lineWidth = trunk.width * 0.5;
    sctx.beginPath();
    sctx.moveTo(m2x, m2y);
    sctx.lineTo(ex, ey);
    sctx.stroke();

    // Branches
    for (const b of trunk.branches) {
      const bSway = Math.sin(t * 0.035 + b.seed) * 4;
      const bex = b.x + Math.cos(b.angle) * b.len + bSway;
      const bey = b.y + Math.sin(b.angle) * b.len + bSway * 0.5;

      sctx.lineWidth = b.width;
      sctx.strokeStyle = 'rgba(2, 1, 4, 0.88)';
      sctx.beginPath();
      sctx.moveTo(b.x + sway * 0.5, b.y + sway * 0.3);
      const bmx = (b.x + bex) / 2 + Math.sin(b.seed * 3) * 10;
      const bmy = (b.y + bey) / 2 + Math.cos(b.seed * 3) * 8;
      sctx.quadraticCurveTo(bmx, bmy, bex, bey);
      sctx.stroke();

      // Sub-branches — smaller tendrils
      for (let sb = 0; sb < b.subBranches; sb++) {
        const subProg = 0.4 + sb * 0.25;
        const subX = b.x + (bex - b.x) * subProg + sway * 0.3;
        const subY = b.y + (bey - b.y) * subProg + sway * 0.2;
        const subAngle = b.angle + (Math.random() - 0.5) * 1.5 + Math.sin(b.seed + sb) * 0.8;
        const subLen = b.len * (0.3 + Math.random() * 0.3);
        const subSway = Math.sin(t * 0.04 + b.seed + sb * 2) * 3;
        const subEX = subX + Math.cos(subAngle) * subLen + subSway;
        const subEY = subY + Math.sin(subAngle) * subLen + subSway * 0.4;

        sctx.lineWidth = b.width * 0.4;
        sctx.beginPath();
        sctx.moveTo(subX, subY);
        sctx.lineTo(subEX, subEY);
        sctx.stroke();

        // Tiny twigs at tips
        for (let tw = 0; tw < 2; tw++) {
          const twAngle = subAngle + (tw - 0.5) * 1.2;
          const twLen = subLen * 0.3;
          sctx.lineWidth = 1 + Math.random();
          sctx.beginPath();
          sctx.moveTo(subEX, subEY);
          sctx.lineTo(subEX + Math.cos(twAngle) * twLen, subEY + Math.sin(twAngle) * twLen);
          sctx.stroke();
        }
      }
    }
  }

  // ── Leaf cluster shadows — irregular dark blobs near branch tips ──
  for (const trunk of trees) {
    for (const b of trunk.branches) {
      const bSway = Math.sin(t * 0.035 + b.seed) * 4;
      const bex = b.x + Math.cos(b.angle) * b.len + bSway;
      const bey = b.y + Math.sin(b.angle) * b.len + bSway * 0.5;
      // Dark foliage cluster
      const lr = 12 + Math.random() * 20;
      sctx.beginPath();
      sctx.arc(bex, bey, lr, 0, Math.PI * 2);
      sctx.fillStyle = 'rgba(2, 1, 4, 0.65)';
      sctx.fill();
    }
  }

  // ── Edge darkness — dense canopy around periphery ──
  const edge = sctx.createRadialGradient(cx, cy, W * 0.12, cx, cy, W * 0.55);
  edge.addColorStop(0, 'transparent');
  edge.addColorStop(0.3, 'rgba(2, 1, 4, 0.15)');
  edge.addColorStop(0.6, 'rgba(2, 1, 4, 0.55)');
  edge.addColorStop(0.85, 'rgba(2, 1, 4, 0.85)');
  edge.addColorStop(1, 'rgba(2, 1, 4, 0.95)');
  sctx.fillStyle = edge;
  sctx.fillRect(0, 0, W, H);
}

function renderAsCode() {
  const imageData = sctx.getImageData(0, 0, W, H);
  const pixels = imageData.data;
  ctx.fillStyle = '#000';
  ctx.clearRect(0, 0, W, H);
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  charTimer++;
  if (charTimer > 30) {
    charTimer = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (Math.random() < 0.04)
          charGrid[r][c] = codeChars[Math.floor(Math.random() * codeChars.length)];
  }
  ctx.font = `${CELL - 1}px monospace`;
  for (let r = 0; r < rows; r++) {
    if (r >= charGrid.length) break;
    for (let c = 0; c < cols; c++) {
      if (c >= charGrid[r].length) break;
      const px = c * CELL + CELL / 2, py = r * CELL + CELL / 2;
      const sx = Math.min(Math.floor(px), W - 1), sy = Math.min(Math.floor(py), H - 1);
      const pidx = (sy * W + sx) * 4;
      let pr = pixels[pidx], pg = pixels[pidx + 1], pb = pixels[pidx + 2];
      const brightness = pr * 0.299 + pg * 0.587 + pb * 0.114;
      if (brightness < 1) {
        if (Math.random() < 0.08) {
          ctx.fillStyle = 'rgba(6, 3, 12, 0.3)';
          ctx.fillText(charGrid[r][c], px, py);
        }
        continue;
      }
      const boost = brightness < 20 ? 2.5 : (brightness < 60 ? 1.8 : 1.2);
      pr = Math.min(255, Math.floor(pr * boost));
      pg = Math.min(255, Math.floor(pg * boost));
      pb = Math.min(255, Math.floor(pb * boost));
      const alpha = Math.min(0.95, 0.2 + brightness / 50);
      ctx.fillStyle = `rgba(${pr},${pg},${pb},${alpha})`;
      ctx.fillText(charGrid[r][c], px, py);
    }
  }
}

function draw() {
  t += 0.016;
  renderScene();
  renderAsCode();
  requestAnimationFrame(draw);
}
draw();
</script>
<script src="js/player.js"></script>
</body>
</html>

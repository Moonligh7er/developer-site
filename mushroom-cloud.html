<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mushroom Cloud</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: default; }
  canvas { display: block; position: fixed; inset: 0; }
  #scene { display: none; }
</style>
<!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SJBEYXVKZ1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SJBEYXVKZ1');
  </script>
</head>
<body>
<canvas id="scene"></canvas>
<canvas id="output"></canvas>
<script>
const sceneCanvas = document.getElementById('scene');
const outCanvas = document.getElementById('output');
const sctx = sceneCanvas.getContext('2d');
const ctx = outCanvas.getContext('2d');

let W, H, t = 0;
const CELL = 6;
let cols, rows;

const codeChars = '01{}[]<>():;=+-*/|!~#@_アイウカキ∞◇◆□∆∇⊕⊗'.split('');
let charGrid = [];
let charTimer = 0;

function resize() {
  W = sceneCanvas.width = outCanvas.width = window.innerWidth;
  H = sceneCanvas.height = outCanvas.height = window.innerHeight;
  cols = Math.ceil(W / CELL);
  rows = Math.ceil(H / CELL);
  charGrid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) row.push(codeChars[Math.floor(Math.random() * codeChars.length)]);
    charGrid.push(row);
  }
}
resize();
window.addEventListener('resize', resize);

// Smoke particles — they rise, roll inward, billow
class SmokeParticle {
  constructor(x, y, r, hue, sat, light, alpha, vx, vy, life) {
    this.x = x; this.y = y; this.r = r;
    this.hue = hue; this.sat = sat; this.light = light; this.alpha = alpha;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.seed = Math.random() * 100;
  }
  update() {
    this.life--;
    // Rise and roll inward toward center column
    this.x += this.vx + Math.sin(t * 0.1 + this.seed) * 0.15;
    this.y += this.vy;
    // Slow down as it ages
    this.vx *= 0.998;
    this.vy *= 0.999;
    // Expand
    this.r += 0.08 + (1 - this.life / this.maxLife) * 0.05;
    // Fade
    this.alpha = this.alpha * (this.life / this.maxLife);
  }
}

let particles = [];
const MAX_PARTICLES = 200;

function spawnParticles() {
  // Stem particles — rise from base
  if (particles.length < MAX_PARTICLES && Math.random() < 0.3) {
    const x = W * 0.5 + (Math.random() - 0.5) * 30;
    const y = H * 0.82 + (Math.random() - 0.5) * 10;
    particles.push(new SmokeParticle(
      x, y,
      8 + Math.random() * 12,
      15 + Math.random() * 20, // orange-red hue
      70 + Math.random() * 20,
      40 + Math.random() * 25,
      0.25 + Math.random() * 0.15,
      (Math.random() - 0.5) * 0.3,
      -0.6 - Math.random() * 0.4, // rise
      300 + Math.random() * 200
    ));
  }

  // Cap particles — billow outward from cap zone then curl inward
  if (particles.length < MAX_PARTICLES && Math.random() < 0.4) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * W * 0.15;
    const x = W * 0.5 + Math.cos(angle) * dist;
    const y = H * 0.25 + Math.sin(angle) * dist * 0.5 + (Math.random() - 0.5) * 30;
    // Roll outward then curl up — inward velocity component
    const outward = 0.2 + Math.random() * 0.3;
    particles.push(new SmokeParticle(
      x, y,
      15 + Math.random() * 25,
      10 + Math.random() * 30,
      50 + Math.random() * 30,
      30 + Math.random() * 30,
      0.12 + Math.random() * 0.12,
      Math.cos(angle) * outward, // push outward
      -0.15 - Math.random() * 0.25 + Math.sin(angle) * 0.1, // rise slowly
      250 + Math.random() * 250
    ));
  }
}

function renderScene() {
  // Sky
  const sky = sctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0a0414');
  sky.addColorStop(0.3, '#120820');
  sky.addColorStop(0.6, '#1a0c28');
  sky.addColorStop(0.85, '#0d0618');
  sky.addColorStop(1, '#060310');
  sctx.fillStyle = sky;
  sctx.fillRect(0, 0, W, H);

  sctx.save();
  sctx.globalCompositeOperation = 'lighter';

  // Ground flash
  const flashX = W * 0.5, flashY = H * 0.82;
  const flashPulse = 0.85 + Math.sin(t * 0.15) * 0.1;
  const flash = sctx.createRadialGradient(flashX, flashY, 0, flashX, flashY, W * 0.22);
  flash.addColorStop(0, `rgba(255, 220, 180, ${0.65 * flashPulse})`);
  flash.addColorStop(0.1, `rgba(255, 160, 100, ${0.40 * flashPulse})`);
  flash.addColorStop(0.25, `rgba(255, 100, 60, ${0.18 * flashPulse})`);
  flash.addColorStop(0.5, `rgba(200, 50, 30, ${0.05 * flashPulse})`);
  flash.addColorStop(1, 'transparent');
  sctx.fillStyle = flash;
  sctx.fillRect(0, flashY - W * 0.25, W, W * 0.5);

  // ── MAIN STEM — persistent rising column ──
  const stemCX = W * 0.5;
  const stemSway = Math.sin(t * 0.03) * 5;
  for (let i = 0; i < 4; i++) {
    const wobble = Math.sin(t * 0.07 + i * 1.2) * 6 + stemSway;
    const cx = stemCX + wobble;
    const stemTop = H * 0.30;
    const stemBot = H * 0.82;
    const width = 20 + i * 6;

    // Turbulence — the stem shifts and roils
    sctx.beginPath();
    sctx.moveTo(cx - width * 1.1, stemBot);
    const pts = 8;
    for (let p = 0; p <= pts; p++) {
      const prog = p / pts;
      const py = stemBot - prog * (stemBot - stemTop);
      const turb = Math.sin(t * 0.12 + prog * 5 + i) * (8 + prog * 12)
                 + Math.sin(t * 0.2 + prog * 8 + i * 2) * 4;
      const w = width * (0.7 + Math.sin(prog * Math.PI) * 0.6); // wider in middle
      sctx.lineTo(cx - w + turb, py);
    }
    for (let p = pts; p >= 0; p--) {
      const prog = p / pts;
      const py = stemBot - prog * (stemBot - stemTop);
      const turb = Math.sin(t * 0.12 + prog * 5 + i + 3) * (8 + prog * 12)
                 + Math.sin(t * 0.2 + prog * 8 + i * 2 + 2) * 4;
      const w = width * (0.7 + Math.sin(prog * Math.PI) * 0.6);
      sctx.lineTo(cx + w + turb, py);
    }
    sctx.closePath();
    const stemG = sctx.createLinearGradient(cx, stemBot, cx, stemTop);
    const a = 0.22 - i * 0.03;
    stemG.addColorStop(0, `rgba(255, 140, 60, ${a})`);
    stemG.addColorStop(0.3, `rgba(200, 70, 40, ${a * 0.7})`);
    stemG.addColorStop(0.6, `rgba(140, 40, 40, ${a * 0.4})`);
    stemG.addColorStop(1, `rgba(80, 25, 35, ${a * 0.2})`);
    sctx.fillStyle = stemG;
    sctx.fill();
  }

  // ── PERSISTENT CAP — the dome shape ──
  const capCX = W * 0.5 + stemSway * 0.5;
  const capCY = H * 0.25 + Math.sin(t * 0.04) * 3;
  const capRX = W * 0.27;
  const capRY = H * 0.16;

  // Cap layers — rolling turbulence
  for (let ring = 0; ring < 5; ring++) {
    const rScale = 0.5 + ring * 0.2;
    // Each ring rolls — offset position oscillates
    const rollX = Math.sin(t * 0.06 + ring * 1.8) * 12 * rScale;
    const rollY = Math.sin(t * 0.08 + ring * 1.3) * 6 * rScale;
    const cx = capCX + rollX;
    const cy = capCY + rollY;

    const rg = sctx.createRadialGradient(cx, cy, capRX * rScale * 0.15, cx, cy, capRX * rScale);
    const a = 0.20 - ring * 0.025;
    rg.addColorStop(0, `rgba(220, 100, 50, ${a})`);
    rg.addColorStop(0.3, `rgba(160, 55, 40, ${a * 0.6})`);
    rg.addColorStop(0.6, `rgba(100, 30, 40, ${a * 0.3})`);
    rg.addColorStop(1, 'transparent');
    sctx.fillStyle = rg;
    sctx.beginPath();
    sctx.ellipse(cx, cy, capRX * rScale, capRY * rScale, 0, 0, Math.PI * 2);
    sctx.fill();
  }

  // Hot bright core — pulses
  const corePulse = 0.9 + Math.sin(t * 0.1) * 0.1;
  const coreG = sctx.createRadialGradient(capCX, capCY - 8, 0, capCX, capCY, capRX * 0.22);
  coreG.addColorStop(0, `rgba(255, 240, 200, ${0.45 * corePulse})`);
  coreG.addColorStop(0.3, `rgba(255, 180, 120, ${0.25 * corePulse})`);
  coreG.addColorStop(1, 'transparent');
  sctx.fillStyle = coreG;
  sctx.fillRect(capCX - capRX * 0.3, capCY - capRY * 0.4, capRX * 0.6, capRY * 0.6);

  // ── SMOKE PARTICLES — the living, rolling motion ──
  spawnParticles();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    if (p.life <= 0 || p.alpha < 0.005) {
      particles.splice(i, 1);
      continue;
    }
    const pg = sctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    pg.addColorStop(0, `hsla(${p.hue}, ${p.sat}%, ${p.light}%, ${p.alpha})`);
    pg.addColorStop(0.5, `hsla(${p.hue}, ${p.sat - 10}%, ${p.light - 10}%, ${p.alpha * 0.4})`);
    pg.addColorStop(1, 'transparent');
    sctx.fillStyle = pg;
    sctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
  }

  // ── Shockwave ring ──
  const ringR = W * 0.38 + Math.sin(t * 0.02) * W * 0.02;
  sctx.beginPath();
  sctx.ellipse(W * 0.5, H * 0.80, ringR, ringR * 0.1, 0, 0, Math.PI * 2);
  sctx.strokeStyle = 'rgba(200, 100, 60, 0.07)';
  sctx.lineWidth = 3;
  sctx.stroke();
  sctx.strokeStyle = 'rgba(160, 70, 45, 0.03)';
  sctx.lineWidth = 12;
  sctx.stroke();

  // Purple atmospheric haze
  const haze = sctx.createLinearGradient(0, 0, 0, H);
  haze.addColorStop(0, 'rgba(50, 15, 70, 0.05)');
  haze.addColorStop(0.5, 'rgba(35, 10, 50, 0.025)');
  haze.addColorStop(1, 'rgba(15, 5, 28, 0.06)');
  sctx.fillStyle = haze;
  sctx.fillRect(0, 0, W, H);

  // Ground
  const gnd = sctx.createLinearGradient(0, H * 0.88, 0, H);
  gnd.addColorStop(0, 'transparent');
  gnd.addColorStop(0.3, 'rgba(12, 5, 20, 0.18)');
  gnd.addColorStop(1, 'rgba(8, 3, 14, 0.30)');
  sctx.fillStyle = gnd;
  sctx.fillRect(0, H * 0.88, W, H * 0.12);

  sctx.restore();
}

function renderAsCode() {
  const imageData = sctx.getImageData(0, 0, W, H);
  const pixels = imageData.data;
  ctx.fillStyle = '#000';
  ctx.clearRect(0, 0, W, H);
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  charTimer++;
  if (charTimer > 30) {
    charTimer = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (Math.random() < 0.04)
          charGrid[r][c] = codeChars[Math.floor(Math.random() * codeChars.length)];
  }
  ctx.font = `${CELL - 1}px monospace`;
  for (let r = 0; r < rows; r++) {
    if (r >= charGrid.length) break;
    for (let c = 0; c < cols; c++) {
      if (c >= charGrid[r].length) break;
      const px = c * CELL + CELL / 2, py = r * CELL + CELL / 2;
      const sx = Math.min(Math.floor(px), W - 1), sy = Math.min(Math.floor(py), H - 1);
      const pidx = (sy * W + sx) * 4;
      let pr = pixels[pidx], pg = pixels[pidx + 1], pb = pixels[pidx + 2];
      const brightness = pr * 0.299 + pg * 0.587 + pb * 0.114;
      if (brightness < 1) {
        if (Math.random() < 0.08) {
          ctx.fillStyle = 'rgba(15,6,22,0.28)';
          ctx.fillText(charGrid[r][c], px, py);
        }
        continue;
      }
      const boost = brightness < 20 ? 2.5 : (brightness < 60 ? 1.8 : 1.2);
      pr = Math.min(255, Math.floor(pr * boost));
      pg = Math.min(255, Math.floor(pg * boost));
      pb = Math.min(255, Math.floor(pb * boost));
      const alpha = Math.min(0.95, 0.2 + brightness / 50);
      ctx.fillStyle = `rgba(${pr},${pg},${pb},${alpha})`;
      ctx.fillText(charGrid[r][c], px, py);
    }
  }
}

function draw() {
  t += 0.016;
  renderScene();
  renderAsCode();
  requestAnimationFrame(draw);
}
draw();
</script>
<script src="js/player.js"></script>
</body>
</html>

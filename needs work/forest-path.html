<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Path</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: default; }
  canvas { display: block; position: fixed; inset: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
let W, H, t = 0;
const CELL = 10;
let cols, rows;

const codeChars = '01{}[]<>():;=+-*/|!~#@_アイウカキ∞◇◆□∆∇⊕⊗'.split('');
let charGrid = [];
let charTimer = 0;

let trees = [];
let fireflies = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cols = Math.ceil(W / CELL);
  rows = Math.ceil(H / CELL);
  charGrid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) row.push(codeChars[Math.floor(Math.random() * codeChars.length)]);
    charGrid.push(row);
  }
  buildForest();
}

function buildForest() {
  trees = [];
  fireflies = [];
  const vpX = W * 0.5, vpY = H * 0.44;

  // Trees with bezier trunks
  const defs = [
    { bx:-0.02,by:1, tx:0.14,ty:0.04, w:24, d:0 },
    { bx:0.06, by:1, tx:0.21,ty:0.01, w:20, d:0 },
    { bx:0.13, by:1, tx:0.27,ty:0.07, w:16, d:0 },
    { bx:0.19, by:0.95,tx:0.33,ty:0.12, w:11, d:1 },
    { bx:0.24, by:0.90,tx:0.37,ty:0.16, w:8,  d:1 },
    { bx:0.28, by:0.85,tx:0.39,ty:0.21, w:5,  d:2 },
    { bx:0.31, by:0.80,tx:0.41,ty:0.26, w:4,  d:2 },
    { bx:1.02,by:1, tx:0.86,ty:0.04, w:24, d:0 },
    { bx:0.94, by:1, tx:0.79,ty:0.01, w:20, d:0 },
    { bx:0.87, by:1, tx:0.73,ty:0.07, w:16, d:0 },
    { bx:0.81, by:0.95,tx:0.67,ty:0.12, w:11, d:1 },
    { bx:0.76, by:0.90,tx:0.63,ty:0.16, w:8,  d:1 },
    { bx:0.72, by:0.85,tx:0.61,ty:0.21, w:5,  d:2 },
    { bx:0.69, by:0.80,tx:0.59,ty:0.26, w:4,  d:2 },
  ];

  for (const d of defs) {
    const seed = Math.random() * 100;
    const bx = d.bx * W, by = d.by * H, tx = d.tx * W, ty = d.ty * H;
    const side = d.bx < 0.5 ? 'L' : 'R';
    const branches = [];
    const bCount = d.d === 0 ? 5 : (d.d === 1 ? 3 : 2);
    for (let i = 0; i < bCount; i++) {
      const p = 0.2 + (i / bCount) * 0.6;
      const ip = 1 - p;
      const m1x = bx + (tx - bx) * 0.35 + Math.sin(seed) * 15;
      const m1y = by + (ty - by) * 0.35;
      const m2x = bx + (tx - bx) * 0.7 + Math.cos(seed * 2) * 10;
      const m2y = by + (ty - by) * 0.7;
      const sx = ip*ip*ip*bx + 3*ip*ip*p*m1x + 3*ip*p*p*m2x + p*p*p*tx;
      const sy = ip*ip*ip*by + 3*ip*ip*p*m1y + 3*ip*p*p*m2y + p*p*p*ty;
      const outAngle = side === 'L' ? (-0.8 + Math.sin(seed + i) * 0.5) : (Math.PI + 0.8 + Math.sin(seed + i) * 0.5);
      branches.push({
        sx, sy, angle: outAngle,
        len: 25 + Math.random() * 45 - d.d * 12,
        w: d.w * (0.25 + Math.random() * 0.2),
        seed: seed + i * 7,
      });
    }
    trees.push({
      bx, by, tx, ty,
      m1x: bx + (tx - bx) * 0.35 + Math.sin(seed) * 15,
      m1y: by + (ty - by) * 0.35,
      m2x: bx + (tx - bx) * 0.7 + Math.cos(seed * 2) * 10,
      m2y: by + (ty - by) * 0.7,
      w: d.w, d: d.d, seed, branches,
    });
  }
  trees.sort((a, b) => b.d - a.d); // background first

  for (let i = 0; i < 15; i++) {
    fireflies.push({
      bx: vpX + (Math.random() - 0.5) * W * 0.22,
      by: vpY + (Math.random() - 0.3) * H * 0.25,
      seed: Math.random() * 100,
      spd: 0.01 + Math.random() * 0.008,
    });
  }
}

resize();
window.addEventListener('resize', resize);

// ═══ PAINT THE SCENE ═══
function paintScene() {
  if (!W || !H) return;
  const vpX = W * 0.5, vpY = H * 0.44;

  // Rich teal-green ambient
  const amb = ctx.createRadialGradient(vpX, H * 0.55, W * 0.06, vpX, H * 0.5, W * 0.6);
  amb.addColorStop(0, 'rgb(8, 28, 22)');
  amb.addColorStop(0.2, 'rgb(18, 75, 58)');
  amb.addColorStop(0.35, 'rgb(28, 120, 92)');
  amb.addColorStop(0.5, 'rgb(35, 145, 110)');
  amb.addColorStop(0.7, 'rgb(25, 110, 85)');
  amb.addColorStop(0.9, 'rgb(12, 60, 48)');
  amb.addColorStop(1, 'rgb(4, 22, 18)');
  ctx.fillStyle = amb;
  ctx.fillRect(0, 0, W, H);

  // Warmer/brighter at bottom entrance
  const ent = ctx.createLinearGradient(0, vpY, 0, H);
  ent.addColorStop(0, 'transparent');
  ent.addColorStop(0.4, 'rgba(25, 110, 88, 0.35)');
  ent.addColorStop(1, 'rgba(38, 150, 115, 0.45)');
  ctx.fillStyle = ent;
  ctx.fillRect(0, vpY, W, H - vpY);

  // Path — brighter ground surface, bezier edges
  ctx.beginPath();
  ctx.moveTo(W * 0.22, H);
  ctx.bezierCurveTo(W * 0.26, H * 0.72, W * 0.36, H * 0.54, vpX - 10, vpY + 30);
  ctx.lineTo(vpX + 10, vpY + 30);
  ctx.bezierCurveTo(W * 0.64, H * 0.54, W * 0.74, H * 0.72, W * 0.78, H);
  ctx.closePath();
  const pathG = ctx.createLinearGradient(vpX, vpY + 30, vpX, H);
  pathG.addColorStop(0, 'rgb(10, 32, 26)');
  pathG.addColorStop(0.3, 'rgb(22, 72, 56)');
  pathG.addColorStop(0.7, 'rgb(35, 100, 78)');
  pathG.addColorStop(1, 'rgb(42, 120, 92)');
  ctx.fillStyle = pathG;
  ctx.fill();

  // Tunnel depth darkness
  const dk = ctx.createRadialGradient(vpX, vpY, 0, vpX, vpY, W * 0.2);
  dk.addColorStop(0, 'rgba(0, 0, 0, 0.92)');
  dk.addColorStop(0.2, 'rgba(0, 0, 0, 0.65)');
  dk.addColorStop(0.5, 'rgba(0, 0, 0, 0.22)');
  dk.addColorStop(0.8, 'rgba(0, 0, 0, 0.05)');
  dk.addColorStop(1, 'transparent');
  ctx.fillStyle = dk;
  ctx.fillRect(0, 0, W, H);

  // Purple mist in deep tunnel
  const purp = ctx.createRadialGradient(vpX, vpY, 0, vpX, vpY, W * 0.12);
  purp.addColorStop(0, 'rgba(35, 10, 50, 0.45)');
  purp.addColorStop(0.5, 'rgba(20, 5, 32, 0.15)');
  purp.addColorStop(1, 'transparent');
  ctx.fillStyle = purp;
  ctx.fillRect(vpX - W * 0.15, vpY - H * 0.15, W * 0.3, H * 0.3);

  // Canopy arch — smooth rounded dome overhead
  // The canopy forms a natural cathedral arch, not angular
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(W, 0);
  // Smooth rounded arch using a single elliptical curve
  // Slight organic wobble on top of the smooth shape
  ctx.lineTo(W, H * 0.08);
  // Right side down to arch bottom-right
  ctx.quadraticCurveTo(W * 0.75, H * 0.06, W * 0.62, H * 0.32 + Math.sin(t * 0.02) * 4);
  // Smooth round bottom of arch
  ctx.quadraticCurveTo(W * 0.5, H * 0.42 + Math.sin(t * 0.025 + 1) * 3, W * 0.38, H * 0.32 + Math.sin(t * 0.02 + 2) * 4);
  // Left side back up
  ctx.quadraticCurveTo(W * 0.25, H * 0.06, 0, H * 0.08);
  ctx.closePath();
  const archG = ctx.createRadialGradient(W * 0.5, H * 0.15, 0, W * 0.5, H * 0.1, W * 0.5);
  archG.addColorStop(0, 'rgb(10, 45, 35)');
  archG.addColorStop(0.4, 'rgb(7, 32, 25)');
  archG.addColorStop(0.8, 'rgb(4, 20, 16)');
  archG.addColorStop(1, 'rgb(3, 14, 11)');
  ctx.fillStyle = archG;
  ctx.fill();

  // Soft light glow around the arch opening — atmosphere
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const archGlow = ctx.createRadialGradient(W * 0.5, H * 0.35, W * 0.05, W * 0.5, H * 0.35, W * 0.22);
  archGlow.addColorStop(0, 'rgba(20, 90, 70, 0.12)');
  archGlow.addColorStop(0.5, 'rgba(10, 60, 48, 0.05)');
  archGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = archGlow;
  ctx.fillRect(0, 0, W, H * 0.5);

  // Ambient light gradients — atmospheric depth like main site
  // Soft teal glow from entrance (bottom)
  const entrGlow = ctx.createRadialGradient(W * 0.5, H * 1.1, 0, W * 0.5, H * 0.8, W * 0.5);
  entrGlow.addColorStop(0, 'rgba(0, 180, 140, 0.08)');
  entrGlow.addColorStop(0.5, 'rgba(0, 120, 95, 0.03)');
  entrGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = entrGlow;
  ctx.fillRect(0, H * 0.5, W, H * 0.5);

  // Violet atmospheric glow in mid-depth
  const violGlow = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.3);
  violGlow.addColorStop(0, 'rgba(80, 30, 120, 0.06)');
  violGlow.addColorStop(0.6, 'rgba(50, 15, 80, 0.03)');
  violGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = violGlow;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();

  // Left foliage wall — 3 organic layers
  for (let layer = 0; layer < 3; layer++) {
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i <= 30; i++) {
      const p = i / 30;
      const arch = Math.sin(p * Math.PI);
      const baseX = W * (0.30 - layer * 0.05);
      const peakX = W * (0.46 + layer * 0.012);
      const x = baseX + (peakX - baseX) * arch;
      const wobble = Math.sin(p * 11 + layer * 2 + t * 0.02) * 14
                   + Math.sin(p * 18 + layer * 3 + t * 0.015) * 8
                   + Math.sin(p * 27 + layer * 5) * 5;
      ctx.lineTo(Math.max(0, x + wobble), H - p * H);
    }
    ctx.lineTo(0, 0);
    ctx.closePath();
    const g = Math.floor(32 + layer * 18);
    ctx.fillStyle = `rgb(${3 + layer * 2}, ${g}, ${Math.floor(g * 0.78)})`;
    ctx.fill();
  }

  // Right foliage wall
  for (let layer = 0; layer < 3; layer++) {
    ctx.beginPath();
    ctx.moveTo(W, H);
    for (let i = 0; i <= 30; i++) {
      const p = i / 30;
      const arch = Math.sin(p * Math.PI);
      const baseX = W * (0.70 + layer * 0.05);
      const peakX = W * (0.54 - layer * 0.012);
      const x = baseX - (baseX - peakX) * arch;
      const wobble = Math.sin(p * 12 + layer * 2.5 + t * 0.018 + 5) * 14
                   + Math.sin(p * 19 + layer * 3.5 + t * 0.013) * 8
                   + Math.sin(p * 26 + layer * 4 + 7) * 5;
      ctx.lineTo(Math.min(W, x + wobble), H - p * H);
    }
    ctx.lineTo(W, 0);
    ctx.closePath();
    const g = Math.floor(32 + layer * 18);
    ctx.fillStyle = `rgb(${3 + layer * 2}, ${g}, ${Math.floor(g * 0.78)})`;
    ctx.fill();
  }

  // Tree trunks
  ctx.lineCap = 'round';
  for (const tree of trees) {
    const sway = Math.sin(t * 0.02 + tree.seed) * (3 - tree.d);
    const dark = 3 + tree.d * 5;
    ctx.strokeStyle = `rgb(${dark}, ${Math.floor(dark * 1.6)}, ${Math.floor(dark * 1.3)})`;
    ctx.lineWidth = tree.w;
    ctx.beginPath();
    ctx.moveTo(tree.bx, tree.by);
    ctx.bezierCurveTo(
      tree.m1x + sway * 0.3, tree.m1y,
      tree.m2x + sway * 0.6, tree.m2y,
      tree.tx + sway, tree.ty
    );
    ctx.stroke();

    // Branches
    for (const br of tree.branches) {
      const bSway = Math.sin(t * 0.03 + br.seed) * 3;
      const ex = br.sx + Math.cos(br.angle) * br.len + bSway;
      const ey = br.sy + Math.sin(br.angle) * br.len + bSway * 0.3;
      ctx.lineWidth = br.w;
      ctx.beginPath();
      ctx.moveTo(br.sx + sway * 0.4, br.sy);
      ctx.quadraticCurveTo((br.sx + ex) / 2 + Math.sin(br.seed) * 8, (br.sy + ey) / 2, ex, ey);
      ctx.stroke();
    }
  }

  // Light shafts — additive
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 5; i++) {
    const lx = W * 0.18 + (i / 4) * W * 0.64 + Math.sin(t * 0.008 + i * 2.1) * 20;
    const depth = H * (0.22 + Math.sin(t * 0.012 + i * 0.9) * 0.04);
    const flicker = Math.max(0, Math.sin(t * 0.5 + i * 2.7) * 0.3 + Math.sin(t * 0.15 + i * 1.4) * 0.2 + 0.55);
    if (flicker > 0.4) {
      const lg = ctx.createLinearGradient(lx, 0, lx, depth);
      lg.addColorStop(0, `rgba(30, 180, 140, ${flicker * 0.14})`);
      lg.addColorStop(0.4, `rgba(15, 120, 95, ${flicker * 0.05})`);
      lg.addColorStop(1, 'transparent');
      ctx.fillStyle = lg;
      ctx.beginPath();
      ctx.moveTo(lx - 4, 0); ctx.lineTo(lx + 4, 0);
      ctx.lineTo(lx + 14, depth); ctx.lineTo(lx - 14, depth);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ═══ CONVERT PAINTED SCENE TO CODE ═══
function convertToCode() {
  if (!W || !H) return;
  // Read back what we just painted
  const imageData = ctx.getImageData(0, 0, W, H);
  const pixels = imageData.data;

  // Clear and redraw as code characters
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  charTimer++;
  if (charTimer > 30) {
    charTimer = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (Math.random() < 0.04)
          charGrid[r][c] = codeChars[Math.floor(Math.random() * codeChars.length)];
  }

  ctx.font = `${CELL}px monospace`;

  for (let r = 0; r < rows; r++) {
    if (r >= charGrid.length) break;
    for (let c = 0; c < cols; c++) {
      if (c >= charGrid[r].length) break;
      const px = c * CELL + CELL / 2;
      const py = r * CELL + CELL / 2;
      const sx = Math.min(Math.floor(px), W - 1);
      const sy = Math.min(Math.floor(py), H - 1);
      const pidx = (sy * W + sx) * 4;
      let pr = pixels[pidx], pg = pixels[pidx + 1], pb = pixels[pidx + 2];
      const brightness = pr * 0.299 + pg * 0.587 + pb * 0.114;

      if (brightness < 2) {
        if (Math.random() < 0.06) {
          ctx.fillStyle = 'rgba(4, 14, 11, 0.3)';
          ctx.fillText(charGrid[r][c], px, py);
        }
        continue;
      }

      const boost = brightness < 30 ? 2.0 : (brightness < 80 ? 1.5 : 1.1);
      pr = Math.min(255, Math.floor(pr * boost));
      pg = Math.min(255, Math.floor(pg * boost));
      pb = Math.min(255, Math.floor(pb * boost));
      const alpha = Math.min(0.95, 0.25 + brightness / 45);
      ctx.fillStyle = `rgba(${pr},${pg},${pb},${alpha})`;
      ctx.fillText(charGrid[r][c], px, py);
    }
  }

  // Fireflies on top
  for (const ff of fireflies) {
    const fx = ff.bx + Math.sin(t * ff.spd + ff.seed) * 30;
    const fy = ff.by + Math.cos(t * ff.spd * 0.8 + ff.seed * 0.7) * 20;
    const fl = Math.sin(t * 0.6 + ff.seed * 3) * 0.5 + 0.5;
    if (fl > 0.45) {
      ctx.fillStyle = `rgba(0, 212, 170, ${fl * 0.8})`;
      ctx.font = `${CELL + 2}px monospace`;
      ctx.fillText(codeChars[Math.floor(Math.random() * codeChars.length)], fx, fy);
      ctx.font = `${CELL}px monospace`;
    }
  }
}

function draw() {
  t += 0.016;
  paintScene();
  convertToCode();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

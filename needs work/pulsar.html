<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulsar</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: crosshair; }
  canvas { display: block; position: fixed; inset: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;
const CELL = 10;
let mouseX = 0.5, mouseY = 0.5, tmx = 0.5, tmy = 0.5;

const codeChars = '01{}[]<>():;=+-*/|!~#@$?._アイウエオカキクケコサシスセソ∞∅∆∇⊕⊗◇◆△▽'.split('');
let charCache = [];
for (let i = 0; i < 2000; i++) charCache.push(codeChars[Math.floor(Math.random() * codeChars.length)]);

// Pulsar state
let beamAngle = 0;
let pulsePhase = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => { tmx = e.clientX / W; tmy = e.clientY / H; });

// ── Beam particles — ejected along the rotation axis ──
let beamParticles = [];
const MAX_BEAM = 300;

function spawnBeamParticles() {
  if (beamParticles.length >= MAX_BEAM) return;

  // Two opposing beams
  for (let b = 0; b < 2; b++) {
    const angle = beamAngle + b * Math.PI;
    const spread = (Math.random() - 0.5) * 0.08;
    const speed = 2 + Math.random() * 4;
    beamParticles.push({
      x: W * 0.5,
      y: H * 0.5,
      vx: Math.cos(angle + spread) * speed,
      vy: Math.sin(angle + spread) * speed,
      life: 120 + Math.random() * 80,
      maxLife: 120 + Math.random() * 80,
      size: 8 + Math.random() * 6,
      char: charCache[Math.floor(Math.random() * charCache.length)],
      hue: Math.random() > 0.5 ? 170 + Math.random() * 20 : 275 + Math.random() * 30,
    });
  }
}

// ── Ring particles — orbit the pulsar ──
let ringParticles = [];
function initRing() {
  ringParticles = [];
  for (let i = 0; i < 200; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 140;
    ringParticles.push({
      angle,
      dist,
      speed: 0.002 + (1 / dist) * 0.3,
      size: 6 + Math.random() * 5,
      char: charCache[Math.floor(Math.random() * charCache.length)],
      yTilt: (Math.random() - 0.5) * 0.3, // slight y variance for thickness
      hue: Math.random() > 0.6 ? (170 + Math.random() * 20) : (275 + Math.random() * 30),
      brightness: 0.3 + Math.random() * 0.5,
    });
  }
}
initRing();

// ── Background stars ──
let bgStars = [];
function initStars() {
  bgStars = [];
  const count = Math.min(2500, Math.floor(W * H / 500));
  for (let i = 0; i < count; i++) {
    bgStars.push({
      x: Math.random(),
      y: Math.random(),
      z: Math.random(),
      size: 2 + Math.random() * 3 + (Math.random() > 0.97 ? 4 : 0),
      hue: Math.random() > 0.6 ? (170 + Math.random() * 20) : (Math.random() > 0.5 ? (275 + Math.random() * 30) : (40 + Math.random() * 15)),
      twinkleSpd: 0.4 + Math.random() * 2.5,
      twinkleOff: Math.random() * Math.PI * 2,
      brightness: 0.15 + Math.random() * 0.5,
    });
  }
}
initStars();

function draw() {
  t += 0.012;
  mouseX += (tmx - mouseX) * 0.03;
  mouseY += (tmy - mouseY) * 0.03;
  if (!W || !H) { requestAnimationFrame(draw); return; }

  // Rotation — the pulsar beam sweeps
  beamAngle += 0.008;

  // Pulse — the star throbs
  pulsePhase += 0.04;
  const pulse = Math.sin(pulsePhase) * 0.3 + 1;
  const pulseBright = Math.sin(pulsePhase * 2) * 0.2 + 0.8;

  // Slow fade for trails
  ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const cx = W * 0.5, cy = H * 0.5;

  // ── BACKGROUND STARS ──
  for (const s of bgStars) {
    const twinkle = Math.sin(t * s.twinkleSpd + s.twinkleOff);
    if (twinkle < -0.3) continue;

    const bright = s.brightness * (twinkle * 0.35 + 0.65);
    if (bright < 0.08) continue;

    const px = (s.x + (mouseX - 0.5) * s.z * 0.03) * W;
    const py = (s.y + (mouseY - 0.5) * s.z * 0.03) * H;
    if (px < -10 || px > W + 10 || py < -10 || py > H + 10) continue;

    const light = 25 + bright * 55;
    const alpha = bright * 0.7;
    ctx.font = `${s.size}px monospace`;
    ctx.fillStyle = `hsla(${s.hue}, 50%, ${light}%, ${alpha})`;
    ctx.fillText(charCache[(Math.floor(px + py * 7)) % charCache.length], px, py);
  }

  // ── NEBULA HAZE around pulsar ──
  // Teal and violet atmospheric glow
  const nebulaHues = [
    { x: cx - W * 0.12, y: cy + H * 0.08, hue: 280, r: W * 0.25 },
    { x: cx + W * 0.10, y: cy - H * 0.06, hue: 180, r: W * 0.20 },
    { x: cx - W * 0.05, y: cy - H * 0.12, hue: 310, r: W * 0.15 },
    { x: cx + W * 0.15, y: cy + H * 0.10, hue: 195, r: W * 0.18 },
  ];
  for (const n of nebulaHues) {
    const breathe = 1 + Math.sin(t * 0.06 + n.hue * 0.01) * 0.04;
    const ncols = Math.ceil(n.r * 2 / CELL);
    const nrows = Math.ceil(n.r * 2 / CELL);

    const startC = Math.max(0, Math.floor((n.x - n.r * breathe) / CELL));
    const endC = Math.min(Math.ceil(W / CELL) - 1, Math.ceil((n.x + n.r * breathe) / CELL));
    const startR = Math.max(0, Math.floor((n.y - n.r * breathe) / CELL));
    const endR = Math.min(Math.ceil(H / CELL) - 1, Math.ceil((n.y + n.r * breathe) / CELL));

    for (let r = startR; r <= endR; r++) {
      for (let c = startC; c <= endC; c++) {
        const px = c * CELL + CELL / 2;
        const py = r * CELL + CELL / 2;
        const dist = Math.hypot(px - n.x, py - n.y) / (n.r * breathe);
        if (dist > 1.2) continue;
        const falloff = Math.max(0, 1 - dist);
        const alpha = falloff * falloff * 0.08;
        if (alpha < 0.005 || Math.random() > 0.5 + alpha * 5) continue;

        ctx.font = `${CELL}px monospace`;
        ctx.fillStyle = `hsla(${n.hue}, 55%, ${30 + falloff * 25}%, ${alpha})`;
        ctx.fillText(charCache[(r * 37 + c * 13) % charCache.length], px, py);
      }
    }
  }

  // ── ACCRETION RING — orbiting code characters ──
  for (const rp of ringParticles) {
    rp.angle += rp.speed;
    const rx = cx + Math.cos(rp.angle) * rp.dist;
    const ry = cy + Math.sin(rp.angle) * rp.dist * 0.3 + Math.sin(rp.angle) * rp.yTilt * rp.dist;

    // Behind the pulsar — dimmer
    const depthFade = Math.sin(rp.angle) * 0.3 + 0.7;
    const alpha = rp.brightness * depthFade * pulseBright * 0.7;
    if (alpha < 0.03) continue;

    const light = 30 + rp.brightness * 40 + depthFade * 15;
    ctx.font = `${rp.size}px monospace`;
    ctx.fillStyle = `hsla(${rp.hue}, 60%, ${light}%, ${alpha})`;
    ctx.fillText(rp.char, rx, ry);
  }

  // ── BEAM — two opposing jets of code ──
  spawnBeamParticles();
  for (let i = beamParticles.length - 1; i >= 0; i--) {
    const bp = beamParticles[i];
    bp.x += bp.vx;
    bp.y += bp.vy;
    bp.life--;
    // Slight spiral drift
    bp.vx += Math.sin(t * 0.3 + i * 0.1) * 0.02;
    bp.vy += Math.cos(t * 0.3 + i * 0.1) * 0.02;

    if (bp.life <= 0 || bp.x < -50 || bp.x > W + 50 || bp.y < -50 || bp.y > H + 50) {
      beamParticles.splice(i, 1);
      continue;
    }

    const lifeRatio = bp.life / bp.maxLife;
    const alpha = lifeRatio * 0.6 * pulseBright;
    const dist = Math.hypot(bp.x - cx, bp.y - cy);
    const nearCore = Math.max(0, 1 - dist / 200);
    const light = 35 + lifeRatio * 40 + nearCore * 25;

    ctx.font = `${bp.size}px monospace`;
    ctx.fillStyle = `hsla(${bp.hue}, ${55 + nearCore * 30}%, ${light}%, ${alpha})`;
    ctx.fillText(bp.char, bp.x, bp.y);

    // Bright near-core particles get glow
    if (nearCore > 0.5 && lifeRatio > 0.7) {
      ctx.font = `${bp.size + 6}px monospace`;
      ctx.fillStyle = `hsla(${bp.hue}, 40%, ${light + 15}%, ${alpha * 0.12})`;
      ctx.fillText('·', bp.x, bp.y);
    }
  }

  // ── PULSAR CORE — the star itself ──
  const coreR = 18 * pulse;

  // Outer glow rings
  for (let ring = 3; ring >= 0; ring--) {
    const rr = coreR * (2.5 + ring * 1.5);
    const ringAlpha = (0.04 - ring * 0.008) * pulseBright;

    const startC = Math.max(0, Math.floor((cx - rr) / CELL));
    const endC = Math.min(Math.ceil(W / CELL) - 1, Math.ceil((cx + rr) / CELL));
    const startR = Math.max(0, Math.floor((cy - rr) / CELL));
    const endR = Math.min(Math.ceil(H / CELL) - 1, Math.ceil((cy + rr) / CELL));

    for (let r = startR; r <= endR; r++) {
      for (let c = startC; c <= endC; c++) {
        const px = c * CELL + CELL / 2;
        const py = r * CELL + CELL / 2;
        const dist = Math.hypot(px - cx, py - cy);
        if (dist > rr || dist < rr * 0.7) continue;
        const bandPos = (dist - rr * 0.7) / (rr * 0.3);
        const falloff = Math.sin(bandPos * Math.PI);
        const alpha = ringAlpha * falloff;
        if (alpha < 0.005) continue;

        const hue = ring % 2 === 0 ? 180 : 280;
        ctx.font = `${CELL}px monospace`;
        ctx.fillStyle = `hsla(${hue}, 50%, ${35 + falloff * 25}%, ${alpha})`;
        ctx.fillText(charCache[(r * 31 + c * 17 + Math.floor(t * 3)) % charCache.length], px, py);
      }
    }
  }

  // Core — bright dense cluster of code
  const coreCells = Math.ceil(coreR * 2 / 10);
  const cStartC = Math.max(0, Math.floor((cx - coreR) / 10));
  const cEndC = Math.min(Math.ceil(W / 10) - 1, Math.ceil((cx + coreR) / 10));
  const cStartR = Math.max(0, Math.floor((cy - coreR) / 10));
  const cEndR = Math.min(Math.ceil(H / 10) - 1, Math.ceil((cy + coreR) / 10));

  for (let r = cStartR; r <= cEndR; r++) {
    for (let c = cStartC; c <= cEndC; c++) {
      const px = c * 10 + 5;
      const py = r * 10 + 5;
      const dist = Math.hypot(px - cx, py - cy) / coreR;
      if (dist > 1.2) continue;
      const falloff = Math.max(0, 1 - dist);
      const alpha = falloff * falloff * pulseBright * 0.9;
      const light = 50 + falloff * 48;
      // Alternate teal and violet at core
      const hue = ((Math.floor(t * 5) + r + c) % 3 === 0) ? 175 : 278;
      ctx.font = `${8 + falloff * 6}px monospace`;
      ctx.fillStyle = `hsla(${hue}, ${50 + falloff * 40}%, ${light}%, ${alpha})`;
      ctx.fillText(charCache[(r * 23 + c * 11 + Math.floor(t * 8)) % charCache.length], px, py);
    }
  }

  // Central bright point
  ctx.font = '14px monospace';
  ctx.fillStyle = `hsla(180, 30%, ${85 + pulseBright * 15}%, ${0.8 * pulseBright})`;
  ctx.fillText('⊕', cx, cy);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

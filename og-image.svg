<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070d"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow-teal" cx="20%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-violet" cx="80%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-teal)"/>
  <rect width="1200" height="630" fill="url(#glow-violet)"/>
  <!-- Grid lines -->
  <line x1="100" y1="0" x2="100" y2="630" stroke="#1a1a30" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#1a1a30" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a1a30" stroke-width="0.5"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#1a1a30" stroke-width="0.5"/>
  <!-- Code rain hints -->
  <text x="120" y="80" font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.12">ア</text>
  <text x="120" y="95" font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.08">0</text>
  <text x="120" y="110" font-family="monospace" font-size="11" fill="#8b5cf6" opacity="0.1">◇</text>
  <text x="320" y="150" font-family="monospace" font-size="11" fill="#8b5cf6" opacity="0.08">∞</text>
  <text x="320" y="165" font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.1">1</text>
  <text x="950" y="100" font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.1">ウ</text>
  <text x="950" y="115" font-family="monospace" font-size="11" fill="#8b5cf6" opacity="0.07">△</text>
  <text x="1050" y="500" font-family="monospace" font-size="11" fill="#00d4aa" opacity="0.09">エ</text>
  <text x="1050" y="515" font-family="monospace" font-size="11" fill="#8b5cf6" opacity="0.06">□</text>
  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="1" fill="#1a1a30"/>
  <rect x="300" y="0" width="300" height="1" fill="#00d4aa" opacity="0.3"/>
  <!-- Logo -->
  <text x="100" y="260" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="16" letter-spacing="0.2em" fill="#7a7a90" text-transform="uppercase">
    <tspan fill="#00d4aa">dev</tspan>://portfolio
  </text>
  <!-- Main heading -->
  <text x="100" y="340" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="300" fill="#e8e8f0">Building things</text>
  <text x="100" y="410" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="300" fill="#00d4aa">between dimensions.</text>
  <!-- Subtitle -->
  <text x="100" y="470" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="0.15em" fill="#4a4a60">Software architect. App developer. Quiet observer of patterns in the static.</text>
  <!-- Bottom accent line -->
  <rect x="0" y="629" width="1200" height="1" fill="#1a1a30"/>
  <rect x="100" y="629" width="200" height="1" fill="#00d4aa" opacity="0.2"/>
  <!-- Decorative dot -->
  <circle cx="1050" cy="315" r="4" fill="#00d4aa" opacity="0.3"/>
  <line x1="1050" y1="240" x2="1050" y2="390" stroke="#1e1e3a" stroke-width="1" opacity="0.5"/>
</svg>
